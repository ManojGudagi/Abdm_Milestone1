<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone 2 - Care Context Linking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>.step-inactive { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }</style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen p-6">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-teal-900 p-6 text-white text-center">
            <h2 class="text-2xl font-extrabold">Milestone 2: HIP Care Context Linking</h2>
            <p class="text-sm text-teal-200 mt-1">Sequence: Gateway Auth &rarr; Link Facility &rarr; Generate Token &rarr; Link Context</p>
        </div>

        <div class="p-8 space-y-6">
            <div id="statusBox" class="hidden p-4 rounded-lg text-sm font-bold text-center mb-4"></div>

            <div id="step1" class="border border-slate-200 rounded-lg p-5 shadow-sm">
                <h3 class="font-bold text-lg text-teal-800 mb-3">1. M2 Gateway Session</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" id="m2ClientId" placeholder="Client ID" class="w-full px-3 py-2 border rounded">
                    <input type="password" id="m2ClientSecret" placeholder="Client Secret" class="w-full px-3 py-2 border rounded">
                </div>
                <button onclick="executeM2Step1()" class="bg-teal-600 text-white font-bold py-2 px-4 rounded w-full">Generate Session</button>
            </div>

            <div id="step2" class="step-inactive border border-slate-200 rounded-lg p-5 shadow-sm">
                <h3 class="font-bold text-lg text-teal-800 mb-3">2. Facility Linkage</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" id="facilityId" placeholder="Facility ID (IN...)" class="w-full px-3 py-2 border rounded">
                    <input type="text" id="facilityName" placeholder="Facility Name" class="w-full px-3 py-2 border rounded">
                </div>
                <button onclick="executeM2Step2()" class="bg-teal-600 text-white font-bold py-2 px-4 rounded w-full">Link Software to Facility</button>
            </div>

            <div id="step3" class="step-inactive border border-slate-200 rounded-lg p-5 shadow-sm">
                <h3 class="font-bold text-lg text-teal-800 mb-3">3. Generate Link Token</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" id="abhaAddress" placeholder="Patient ABHA Address" class="w-full px-3 py-2 border rounded">
                    <input type="text" id="patientName" placeholder="Patient Name" class="w-full px-3 py-2 border rounded">
                    <select id="gender" class="w-full px-3 py-2 border rounded">
                        <option value="M">Male</option><option value="F">Female</option><option value="O">Other</option>
                    </select>
                    <input type="number" id="yob" placeholder="Year of Birth (YYYY)" class="w-full px-3 py-2 border rounded">
                </div>
                <button onclick="executeM2Step3()" class="bg-teal-600 text-white font-bold py-2 px-4 rounded w-full">Generate Link Token</button>
            </div>

            <div id="step4" class="step-inactive border border-slate-200 rounded-lg p-5 shadow-sm">
                <h3 class="font-bold text-lg text-teal-800 mb-3">4. Link Care Context</h3>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <input type="text" id="referenceNumber" placeholder="Reference No (e.g. TMH-001)" class="w-full px-3 py-2 border rounded">
                    <input type="text" id="display" placeholder="Display Text" class="w-full px-3 py-2 border rounded">
                </div>
                <button onclick="executeM2Step4()" class="bg-teal-600 text-white font-bold py-2 px-4 rounded w-full">Link to ABHA</button>
            </div>
        </div>
    </div>

    <script>
        let m2Token = "", globalHipId = "", globalLinkToken = "", globalAbhaAddress = "";

        function showMessage(msg, isError = false) {
            const box = document.getElementById('statusBox');
            box.style.display = 'block'; box.innerText = msg;
            box.className = isError ? 'p-4 rounded bg-red-100 text-red-700 mb-4' : 'p-4 rounded bg-teal-100 text-teal-800 mb-4';
        }

        function activate(step) {
            document.getElementById('step'+step).classList.remove('step-inactive');
            if(step > 1) document.getElementById('step'+(step-1)).classList.add('opacity-50', 'pointer-events-none');
        }

        async function executeM2Step1() {
            const payload = { clientId: document.getElementById('m2ClientId').value, clientSecret: document.getElementById('m2ClientSecret').value, grantType: "client_credentials" };
            const res = await fetch('/api_m2/v2/gateway/sessions/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            if (res.ok) { const data = await res.json(); m2Token = data.accessToken; activate(2); showMessage("Session Generated"); }
        }

        async function executeM2Step2() {
            globalHipId = document.getElementById('facilityId').value;
            const payload = { facilityId: globalHipId, facilityName: document.getElementById('facilityName').value, HRP: [{bridgeId: "YOUR_BRIDGE_ID", hipName: "Hospital", type: "HIP", active: true}] };
            const res = await fetch('/api_m2/v2/facility/link-software/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + m2Token }, body: JSON.stringify(payload) });
            if (res.ok) { activate(3); showMessage("Facility Linked"); }
        }

        async function executeM2Step3() {
            globalAbhaAddress = document.getElementById('abhaAddress').value;
            const payload = { hipId: globalHipId, abhaAddress: globalAbhaAddress, name: document.getElementById('patientName').value, gender: document.getElementById('gender').value, yearOfBirth: parseInt(document.getElementById('yob').value) };
            const res = await fetch('/api_m2/v2/token/generate/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + m2Token }, body: JSON.stringify(payload) });
            if (res.ok) { 
                const data = await res.json(); 
                globalLinkToken = data.linkToken || "FETCHED_FROM_HEADER_OR_BODY"; // Adjust based on your API response
                activate(4); showMessage("Token Generated"); 
            }
        }

        async function executeM2Step4() {
            const payload = {
                hipId: globalHipId, linkToken: globalLinkToken, abhaAddress: globalAbhaAddress,
                patient: [{
                    referenceNumber: "P-123", display: "Patient Details", hiType: "OPConsultation", count: 1,
                    careContexts: [{ referenceNumber: document.getElementById('referenceNumber').value, display: document.getElementById('display').value }]
                }]
            };
            const res = await fetch('/api_m2/v2/care-context/link/', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + m2Token }, body: JSON.stringify(payload) });
            if (res.ok) { showMessage("Care Context Linked Successfully!"); }
        }
    </script>
</body>
</html>
