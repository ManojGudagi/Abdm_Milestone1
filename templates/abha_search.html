</div>

<script>

let searchTxnId = "";
let otpTxnId = "";
let otpSystem = "";

const gatewayToken =
    sessionStorage.getItem("gatewayAccessToken");

function showMessage(msg, error=false){

    const box = document.getElementById("statusBox");

    box.style.display = "block";
    box.innerHTML = msg;

    box.className = error
        ? "mb-6 p-4 rounded-lg text-sm font-bold text-center bg-red-100 text-red-700"
        : "mb-6 p-4 rounded-lg text-sm font-bold text-center bg-green-100 text-green-700";
}

function updateProgress(step){

    document.getElementById("dot1").className =
        step >= 1
        ? "h-3 w-3 bg-blue-600 rounded-full"
        : "h-3 w-3 bg-gray-300 rounded-full";

    document.getElementById("dot2").className =
        step >= 2
        ? "h-3 w-3 bg-blue-600 rounded-full"
        : "h-3 w-3 bg-gray-300 rounded-full";

    document.getElementById("dot3").className =
        step >= 3
        ? "h-3 w-3 bg-blue-600 rounded-full"
        : "h-3 w-3 bg-gray-300 rounded-full";
}

async function searchAbha(){

    const searchHint =
        document.getElementById("searchHint").value;

    const loginId =
        document.getElementById("loginId").value.trim();

    otpSystem =
        searchHint === "aadhaar"
        ? "aadhaar"
        : "abdm";

    const payload = {
        searchHint,
        loginId
    };

    try{

        const response = await fetch(
            "/profile/account/abha/search/",
            {
                method: "POST",
                headers: {
                    "Content-Type":"application/json",
                    "Authorization":"Bearer " + gatewayToken
                },
                body: JSON.stringify(payload)
            }
        );

        const data = await response.json();

        console.log("Search Response:", data);

        if(response.ok){

            searchTxnId = data.txnId;

            populateResults(data);

            document.getElementById("step1").classList.add("hidden");
            document.getElementById("step2").classList.remove("hidden");

            updateProgress(2);

        }else{
            showMessage(JSON.stringify(data), true);
        }

    }catch(err){
        console.error(err);
        showMessage("Search Failed", true);
    }
}

function populateResults(data){

    const select =
        document.getElementById("abhaIndex");

    select.innerHTML = "";

    if(data.abhaAddresses){

        data.abhaAddresses.forEach((item,index)=>{

            select.innerHTML += `
                <option value="${index+1}">
                    ${item}
                </option>
            `;
        });
    }
}

async function requestOtp(){

    const payload = {

        loginHint: "index",

        loginId:
            document.getElementById("abhaIndex").value,

        txnId: searchTxnId,

        otpSystem: otpSystem
    };

    try{

        const response = await fetch(
            "/profile/search/request/otp/",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Bearer " + gatewayToken
                },
                body: JSON.stringify(payload)
            }
        );

        const data = await response.json();

        console.log("OTP Response:", data);

        if(response.ok){

            otpTxnId = data.txnId;

            document.getElementById("step2").classList.add("hidden");
            document.getElementById("step3").classList.remove("hidden");

            updateProgress(3);

        }else{
            showMessage(JSON.stringify(data), true);
        }

    }catch(err){
        console.error(err);
        showMessage("OTP Request Failed", true);
    }
}

async function verifyOtp(){

    const payload = {

        txnId: otpTxnId,

        otpValue:
            document.getElementById("otpValue").value,

        otpSystem: otpSystem
    };

    try{

        const response = await fetch(
            "/profile/search/verify/otp/",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json",
                    "Authorization":"Bearer " + gatewayToken
                },
                body: JSON.stringify(payload)
            }
        );

        const data = await response.json();

        console.log("Verify Response:", data);

        if(response.ok){

            sessionStorage.setItem(
                "dashboardData",
                JSON.stringify(data)
            );

            showMessage("ABHA Found Successfully");

        }else{
            showMessage(JSON.stringify(data), true);
        }

    }catch(err){
        console.error(err);
        showMessage("Verification Failed", true);
    }
}

</script>
