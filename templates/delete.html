<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete ABHA Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 sm:p-8">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden">
        
        <div class="bg-red-600 px-6 py-4 flex justify-between items-center">

            <h1 class="text-white text-xl font-bold flex items-center">

                <span class="mr-2">⚠️</span> Delete Account
                
            </h1>

            <button onclick="window.location.href='/api5/v1/portal/dashboard/'" class="text-orange-100 hover:text-white text-sm font-bold transition">
                &larr; Back
            </button>

        </div>

        <div class="p-6 sm:p-8">
            <div id="deleteStatus" class="hidden mb-6 p-4 rounded-lg text-sm font-bold text-center"></div>

            <div id="deleteStep1">
                <h2 class="text-lg font-bold text-gray-900 mb-2">Permanent Deletion</h2>
                <p class="text-sm text-gray-600 mb-6">Warning: This action cannot be undone. Enter your ABHA number to receive a deletion OTP.</p>
                
                <label class="block text-sm font-bold text-gray-700 mb-2">ABHA Number</label>
                <input type="text" id="deleteAbhaInput" placeholder="e.g. 91-XXXX-XXXX-XXXX" class="w-full px-4 py-3 rounded-lg border border-gray-300 mb-6 outline-none focus:border-red-500 focus:ring-2 focus:ring-red-200 transition">
                
                <button onclick="requestDeleteOtp()" id="btnDeleteOtp" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg shadow-md transition">
                    Send Deletion OTP
                </button>
            </div>

            <div id="deleteStep2" class="hidden">
                <h2 class="text-lg font-bold text-gray-900 mb-2">Verify Deletion</h2>
                <p class="text-sm text-gray-600 mb-6">An OTP has been sent to your Aadhaar-linked mobile number.</p>
                
                <label class="block text-sm font-bold text-gray-700 mb-2">Enter 6-Digit OTP</label>
                <input type="text" id="deleteOtpInput" placeholder="******" maxlength="6" class="w-full px-4 py-3 rounded-lg border border-gray-300 mb-6 text-center text-3xl tracking-[0.5em] font-mono outline-none focus:border-red-500 focus:ring-2 focus:ring-red-200 transition">
                
                <button onclick="verifyDeleteOtp()" id="btnDeleteVerify" class="w-full bg-red-800 hover:bg-red-900 text-white font-bold py-3 rounded-lg shadow-md transition">
                    Confirm & Permanently Delete
                </button>
            </div>
        </div>
    </div>

    <script>
    // Grab the token from session storage, just like the dashboard does
    const gatewayToken = sessionStorage.getItem('gatewayAccessToken');
    let deleteTxnId = ""; 

    function showStatus(msg, isError = false) {
        const box = document.getElementById('deleteStatus');
        box.classList.remove('hidden');
        box.innerText = msg;
        box.className = isError 
            ? `mb-6 p-4 rounded-lg text-sm font-bold text-center bg-red-50 text-red-700 border border-red-200` 
            : `mb-6 p-4 rounded-lg text-sm font-bold text-center bg-green-50 text-green-700 border border-green-200`;
    }

    function extractErrorMessage(errData) {
        if (!errData) return "An unknown error occurred.";
        if (typeof errData === 'string') {
            try { return extractErrorMessage(JSON.parse(errData)); } 
            catch (e) { return errData.replace(/\\"/g, '"').replace(/^"|"$/g, ''); }
        }
        if (typeof errData === 'object') {
            if (errData.message) return errData.message;
            if (errData.error) return errData.error;
            if (errData.details) return errData.details;
            const keys = Object.keys(errData);
            if (keys.length > 0) return Array.isArray(errData[keys]) ? errData[keys] : errData[keys];
        }
        return "Request failed. Please try again.";
    }

    async function requestDeleteOtp() {
        const abhaInput = document.getElementById("deleteAbhaInput").value.trim();
        const btn = document.getElementById("btnDeleteOtp");

        const xToken = sessionStorage.getItem('abhaProfileToken');

        if (!abhaInput) {
            showStatus("Please enter your ABHA number.", true);
            return;
        }

        if (!xToken) {
            showStatus("Session token missing. Please log out and log in again.", true);
            return;
        }

        btn.innerText = "Requesting...";
        btn.disabled = true;

        try {
            const response = await fetch('/api10/v1/delete/generate-otp/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + gatewayToken, // Included just in case your API needs it
                    'X-Token': xToken
                },
                body: JSON.stringify({ "ABHANumber": abhaInput })
            });
            const data = await response.json();

            if (response.ok && data.txnId) {
                deleteTxnId = data.txnId;
                document.getElementById('deleteStep1').classList.add('hidden');
                document.getElementById('deleteStep2').classList.remove('hidden');
                showStatus("OTP sent successfully!");
            } else {
                showStatus(extractErrorMessage(data), true);
            }
        } catch (err) {
            showStatus("Server error. Could not connect to backend.", true);
        } finally {
            btn.innerText = "Send Deletion OTP";
            btn.disabled = false;
        }
    }

    async function verifyDeleteOtp() {
        const otp = document.getElementById("deleteOtpInput").value.trim();
        const btn = document.getElementById("btnDeleteVerify");

        const xToken = sessionStorage.getItem('abhaProfileToken');

        if (otp.length < 6) {
            showStatus("Enter a valid 6-digit OTP.", true);
            return;
        }

        btn.innerText = "Deleting Account...";
        btn.disabled = true;

        try {
            const response = await fetch('/api10/v1/delete/verify-otp/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + gatewayToken,
                    'X-Token': xToken
                },
                body: JSON.stringify({ "txnId": deleteTxnId, "otpValue": otp })
            });
            const data = await response.json();

            if (response.ok) {
                showStatus("Account successfully deleted. Logging out...");
                document.getElementById('deleteStep2').classList.add('hidden');
                
                // Clear session and redirect to login/home
                setTimeout(() => {
                    sessionStorage.clear();
                    window.location.href = '/api5/v1/'; 
                }, 3000);
            } else {
                showStatus(extractErrorMessage(data), true);
            }
        } catch (err) {
            showStatus("Server error during verification.", true);
        } finally {
            btn.innerText = "Confirm & Permanently Delete";
            btn.disabled = false;
        }
    }
    </script>
</body>
</html>
